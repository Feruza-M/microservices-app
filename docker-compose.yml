services:
  postgres:
    image: postgres:15
    container_name: micro_postgres
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: micro_api
    environment:
      DATABASE_URL: postgresql://tasks_user:tasks_pass@postgres:5432/tasks_db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: micro_frontend
    environment:
      API_URL: http://api:5000
    depends_on:
      - api

  worker:
    build: ./worker
    container_name: micro_worker
    environment:
      DATABASE_URL: postgresql://tasks_user:tasks_pass@postgres:5432/tasks_db
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: micro_nginx
    ports:
      - "85:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api

volumes:
  postgres_data:
